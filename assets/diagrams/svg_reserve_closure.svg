<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="740" viewBox="0 0 1100 740" font-family="Noto Sans CJK SC, Microsoft YaHei, sans-serif">
  <defs>
    <pattern id="hatchR" width="9" height="9" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="9" height="9" fill="#F6E3DE"/><line x1="0" y1="0" x2="0" y2="9" stroke="#C0392B" stroke-width="2.4"/>
    </pattern>
  </defs>
  <rect width="1100" height="700" fill="#FFFFFF"/>
  <text x="100" y="48" font-size="25" font-weight="bold" fill="#16324F">回收推进剂预算闭合：18 t 储备 ⇔ 远海回收需求</text>
  <text x="100" y="76" font-size="15.5" fill="#5B6670">可用 Δv = Isp × 9.80665 × ln(58 t/40 t) = 1.03–1.13 km/s（Isp 282–311 s，Day 3 数据）；点火分配取自 Day 2 §2.3</text>

  <!-- grid + axis -->
  <g stroke="#D9E2EC" stroke-width="1">
    <line x1="100" y1="535" x2="1040" y2="535"/><line x1="100" y1="410" x2="1040" y2="410"/>
    <line x1="100" y1="285" x2="1040" y2="285"/><line x1="100" y1="160" x2="1040" y2="160"/>
  </g>
  <line x1="100" y1="660" x2="1040" y2="660" stroke="#16324F" stroke-width="2"/>
  <line x1="100" y1="660" x2="100" y2="160" stroke="#16324F" stroke-width="2"/>
  <g font-size="14" fill="#16324F">
    <text x="76" y="665">0.0</text><text x="76" y="540">0.5</text><text x="76" y="415">1.0</text><text x="76" y="290">1.5</text>
    <text x="76" y="165">2.0</text>
  </g>
  <text x="36" y="410" font-size="15" fill="#16324F" transform="rotate(-90 36 410)" text-anchor="middle">Δv (km/s)</text>

  <!-- availability band lines -->
  <line x1="160" y1="403" x2="1000" y2="403" stroke="#2E8B57" stroke-width="1.6" stroke-dasharray="7 5"/>
  <line x1="160" y1="377" x2="1000" y2="377" stroke="#2E8B57" stroke-width="1.6" stroke-dasharray="7 5"/>
  <text x="400" y="370" font-size="14" font-weight="bold" fill="#2E8B57">可用区间 1.03–1.13</text>

  <!-- col1 available -->
  <rect x="110" y="376.8" width="120" height="26.2" fill="#BFE3CE" stroke="#2E8B57" stroke-width="2"/>
  <text x="170" y="360" font-size="14.5" fill="#2E8B57" text-anchor="middle" font-weight="bold">1.03–1.13</text>
  <text x="170" y="686" font-size="15" fill="#16324F" text-anchor="middle">可用 Δv</text>
  <text x="170" y="712" font-size="13" fill="#5B6670" text-anchor="middle">(18 t 储备)</text>

  <!-- col2 entry burn -->
  <rect x="295" y="460" width="90" height="75" fill="#F5C9A6" stroke="#E0561E" stroke-width="2"/>
  <text x="340" y="446" font-size="14.5" fill="#C0392B" text-anchor="middle">0.50–0.80</text>
  <text x="340" y="686" font-size="15" fill="#16324F" text-anchor="middle">再入点火</text>

  <!-- col3 landing burn -->
  <rect x="435" y="610" width="90" height="25" fill="#F5C9A6" stroke="#E0561E" stroke-width="2"/>
  <text x="480" y="596" font-size="14.5" fill="#C0392B" text-anchor="middle">0.20–0.30</text>
  <text x="480" y="686" font-size="15" fill="#16324F" text-anchor="middle">末段点火</text>

  <!-- col4 RCS/settling -->
  <rect x="575" y="647.5" width="90" height="12.5" fill="#F5C9A6" stroke="#E0561E" stroke-width="2"/>
  <text x="620" y="633" font-size="14.5" fill="#C0392B" text-anchor="middle">≈0.1（余量）</text>
  <text x="620" y="686" font-size="15" fill="#16324F" text-anchor="middle">姿控/沉降</text>

  <!-- col5 downrange total -->
  <rect x="725" y="360" width="110" height="300" fill="#E7EDF4" stroke="#16324F" stroke-width="2.4"/>
  <text x="780" y="344" font-size="15" fill="#16324F" text-anchor="middle" font-weight="bold">合计 ≈0.8–1.2</text>
  <text x="780" y="686" font-size="15" fill="#16324F" text-anchor="middle">远海回收需求</text>
  <text x="780" y="712" font-size="13" font-weight="bold" fill="#2E8B57" text-anchor="middle">可行：预算闭合（上限偏紧）</text>

  <!-- col6 RTLS total -->
  <rect x="885" y="235" width="110" height="425" fill="url(#hatchR)" stroke="#C0392B" stroke-width="2.4"/>
  <text x="940" y="219" font-size="15" fill="#C0392B" text-anchor="middle" font-weight="bold">合计 ≈1.1–1.7</text>
  <text x="940" y="686" font-size="15" fill="#C0392B" text-anchor="middle">返场(RTLS)需求</text>
  <text x="940" y="712" font-size="13" font-weight="bold" fill="#C0392B" text-anchor="middle">不可行：储备不支持（含返场点火 +0.3–0.5）</text>

  <!-- connectors -->
  <g stroke="#9AA7B2" stroke-width="1.3" stroke-dasharray="4 4">
    <line x1="385" y1="460" x2="435" y2="460"/><line x1="385" y1="535" x2="435" y2="535"/>
    <line x1="525" y1="610" x2="575" y2="610"/><line x1="525" y1="660" x2="575" y2="660"/>
    <line x1="665" y1="647.5" x2="725" y2="647.5"/>
  </g>
  <text x="1012" y="300" font-size="13.5" fill="#C0392B" font-weight="bold" transform="rotate(-90 1020 300)" text-anchor="middle">超出可用区间</text>
</svg>
